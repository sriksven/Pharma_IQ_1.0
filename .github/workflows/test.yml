name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: test
      OPENAI_API_KEY: test
      UPSTASH_REDIS_URL: test
      UPSTASH_REDIS_TOKEN: test
      LIVEKIT_URL: ""
      LIVEKIT_API_KEY: ""
      LIVEKIT_API_SECRET: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: >
          export PYTHONPATH=$(pwd):$(pwd)/backend &&
          pytest
          data_pipeline/tests/
          chat_pipeline/tests/
          eval_and_metrics/tests/
          backend/tests/
          voice_pipeline/tests/
          -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm test -- --run
